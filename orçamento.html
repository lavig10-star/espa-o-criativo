<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faça um Orçamento</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #d8d4cc);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
        }

        .container h1 {
            text-align: center;
            margin-bottom: 25px;
            color: #141414;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #333;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 15px;
            transition: 0.3s;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: #d8d4cc;
            outline: none;
        }

        textarea {
            resize: none;
            height: 100px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background-color: #d8d4cc;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #d8d4cc;
        }

        .voltar {
            display: inline-block;
            margin-top: 60px;
            padding: 12px 25px;
            border: 1px solid #222;
            text-decoration: none;
            color: #222;
            transition: 0.3s;
        }

        .voltar:hover {
            background: #222;
            color: #fff;
        }

        @media (max-width: 1024px) {
            .princ {
                padding: 40px;
            }

            .info {
                grid-template-columns: repeat(2, 1fr);
            }

            .galeria {
                grid-template-columns: repeat(2, 1fr);
            }

            .princ h1 {
                font-size: 40px;
            }
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Faça um Orçamento</h1>
        <form>
            <div class="form-group">
                <label>Nome Completo</label>
                <input type="text" placeholder="Digite seu nome" required>
            </div>

            <div class="form-group">
                <label>E-mail</label>
                <input type="email" placeholder="Digite seu e-mail" required>
            </div>

            <div class="form-group">
                <label>Telefone</label>
                <input type="tel" placeholder="(00) 00000-0000" required>
            </div>

            <div class="form-group">
                <label>Tipo de Serviço</label>
                <select required>
                    <option value="">Selecione</option>
                    <option>Arquitetura Residencial</option>
                    <option>Design de Interiores</option>
                    <option>Paisagismo</option>
                    <option>Reformas e Ampliações</option>
                    <option>Outros</option>
                </select>
            </div>

            <div class="form-group">
                <label>Descreva seu Projeto</label>
                <textarea placeholder="Explique o que você precisa..."></textarea>
            </div>

            <button type="submit">Solicitar Orçamento</button>
        </form>
        <a href="index.html#serviso" class="voltar">Voltar para Projetos</a>
    </div>
    
</body>

</html>
